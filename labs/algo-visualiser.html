<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Visualab | Undrstanding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Fira+Code:wght@700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../assests/undrlogo.svg">
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800;900&display=swap');

        :root {
            --bg: #f7f7f7;
            --border: #000000;
            --text: #0a0a0a;
            --text-muted: #666666;
            --p-blue: #dbeafe;
            --p-green: #dcfce7;
            --p-yellow: #fef9c3;
            --p-purple: #f3e8ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            height: 60px;
            border-bottom: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: #fff;
            flex-shrink: 0;
            z-index: 100;
        }

        /* Branding Logo */
        .logo-wrap {
            text-decoration: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-right: 20px;
        }

        .logo-wrap:hover {
            transform: translateY(-1px);
            opacity: 0.85;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: #000;
            padding: 4px 0;
            text-transform: uppercase;
            font-size: 1.2rem;
            display: inline-block;
            letter-spacing: -1.2px;
        }

        .logo-badge {
            background: #0d9488;
            color: #fff;
            font-size: 0.95rem;
            padding: 2px 14px;
            border: 3px solid #000;
            border-radius: 6px;
            box-shadow: 3px 3px 0 #000;
            /* Bold hard shadow */
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-title {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            height: 38px;
            padding: 0 20px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid var(--border);
            background: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 #000;
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: none;
        }

        .btn-run {
            background: var(--p-green);
        }

        .btn-visualize {
            background: var(--p-blue);
        }

        /* Language Switcher */
        .language-switcher {
            display: flex;
            background: #fff;
            padding: 4px;
            border-radius: 9999px;
            border: 3px solid var(--border);
            position: relative;
        }

        .lang-pill {
            padding: 0 14px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.63rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            border-radius: 9999px;
            cursor: pointer;
            transition: color 0.25s;
            color: var(--text-muted);
            position: relative;
            z-index: 2;
            white-space: nowrap;
        }

        .lang-pill.active {
            color: #000;
        }

        .lang-pill:hover {
            color: var(--text);
        }

        .switcher-highlight {
            position: absolute;
            height: 30px;
            top: 4px;
            left: 4px;
            background: var(--p-yellow);
            border: 2px solid #000;
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.1s;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        /* Workspace */
        .workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 60px - 28px);
            overflow: hidden;
        }

        .panel-left {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 3px solid var(--border);
        }

        .panel-right {
            width: 50%;
            display: flex;
            flex-direction: column;
        }

        .editor-container-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 3px solid var(--border);
            overflow: hidden;
            min-height: 0;
        }

        .console-container-wrapper {
            height: 200px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .console-container-wrapper.collapsed {
            height: 40px !important;
        }

        .console-container-wrapper.collapsed #console-output {
            display: none;
        }

        .icon-btn {
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #f1f5f9;
            color: #000;
        }

        .icon-btn.btn-trash:hover {
            color: #ef4444;
            /* Pinkish-red */
            background: #fee2e2;
        }

        /* Platform Security (Copy-Paste Control) */
        body {
            user-select: none;
            -webkit-user-select: none;
        }

        #editor-container,
        #console-output,
        textarea,
        input {
            user-select: text !important;
            -webkit-user-select: text !important;
        }

        .panel-header {
            height: 40px;
            flex-shrink: 0;
            background: #fff;
            border-bottom: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: 'JetBrains Mono', monospace;
            gap: 10px;
        }

        .header-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        #editor-container {
            flex-grow: 1;
            min-height: 0;
            background: #1e1e1e;
        }

        #console-output {
            flex-grow: 1;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            line-height: 1.6;
            overflow-y: auto;
            background: #fff;
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        #console-output::-webkit-scrollbar {
            width: 1px;
        }

        #console-output::-webkit-scrollbar-track {
            background: transparent;
        }

        #console-output::-webkit-scrollbar-thumb {
            background: transparent;
        }

        #console-output:hover::-webkit-scrollbar-thumb {
            background: #d1d5db;
        }

        /* Visualizer */
        #visualizer-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        .vis-stage {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 32px 24px 24px;
            gap: 5px;
        }

        .bar-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            background: var(--p-blue);
            border: 2.5px solid #000;
            border-radius: 5px;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .bar.comparing {
            background: var(--p-yellow);
            transform: translateY(-6px);
        }

        .bar.swapping {
            background: var(--p-purple);
            transform: scale(1.08);
            transform-origin: bottom;
        }

        .bar.sorted {
            background: var(--p-green);
        }

        .bar.swap-candidate {
            background: #ffedd5;
            border-color: #f97316;
            border-width: 3px;
            transform: translateY(-8px) scaleX(1.06);
            transform-origin: bottom;
            box-shadow: 0 4px 0 #f97316;
        }

        .bar-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.58rem;
            font-weight: 800;
            color: #000;
            opacity: 0.45;
        }

        /* Step Controls */
        .step-btn {
            height: 28px;
            padding: 0 10px;
            border: 2.5px solid #000;
            border-radius: 9999px;
            background: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }

        .step-btn:hover {
            background: #f1f5f9;
            box-shadow: 2px 2px 0 #000;
            transform: translateY(-1px);
        }

        /* Search Visuals (Squares) */
        .square {
            width: 54px;
            height: 54px;
            background: #fff;
            border: 3.5px solid #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.1rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 4px 4px 0 #000;
        }

        .square.found {
            background: var(--p-green);
            transform: scale(1.15) rotate(3deg);
            z-index: 100 !important;
            box-shadow: 6px 6px 0 #000;
            color: #000;
        }

        .square.comparing {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: translateY(-2px);
        }

        .square.swap-candidate {
            border-color: #f59e0b;
            background: #fffbeb;
            transform: translateY(-4px);
        }

        .square-label {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #000;
            white-space: nowrap;
            background: #fff;
            padding: 2px 6px;
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        .square[data-pointer="MID"] .square-label {
            background: #f59e0b;
            color: #000;
            animation: bounceTiny 0.6s infinite alternate;
        }

        @keyframes bounceTiny {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-3px); }
        }

        .step-btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .step-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .step-btn-play {
            background: var(--p-blue);
            min-width: 52px;
            justify-content: center;
        }

        .step-counter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            font-weight: 800;
            padding: 0 10px;
            border: 2px solid #000;
            border-radius: 9999px;
            background: var(--p-yellow);
            white-space: nowrap;
            line-height: 26px;
        }

        /* Footer */
        footer {
            height: 28px;
            flex-shrink: 0;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
        }



        @media (max-width: 768px) {
            .workspace {
                display: block;
                height: calc(100vh - 60px - 28px);
                overflow: hidden;
            }

            .panel-left,
            .panel-right,
            #panel-editor,
            #panel-console {
                width: 100% !important;
                height: 100% !important;
                display: none;
                flex-direction: column;
            }

            .panel-left.active,
            .panel-right.active,
            #panel-editor.active,
            #panel-console.active {
                display: flex;
            }

            .mobile-nav {
                display: flex !important;
                background: transparent !important;
                border: none !important;
            }

            .header-left {
                flex-grow: 1;
            }

            .controls {
                display: none;
            }

            /* Fix Visualization controls on mobile */
            #step-controls {
                gap: 2px !important;
                display: flex !important;
                flex-wrap: nowrap !important;
                justify-content: center;
                padding: 4px;
                width: 100%;
                overflow: hidden;
            }

            .step-btn {
                height: 28px !important;
                padding: 0 6px !important;
                font-size: 0.6rem !important;
                min-width: 28px;
            }

            #step-counter {
                padding: 0 6px !important;
                font-size: 0.55rem !important;
                white-space: nowrap;
            }

            #btn-first,
            #btn-last {
                display: none !important;
            }

            .step-btn i {
                font-size: 0.8rem;
            }
        }

        #vis-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #vis-content.fading {
            opacity: 0;
            transform: scale(0.98) translateY(20px);
            filter: blur(8px);
        }

        /* Mobile Pill Nav */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 44px;
            left: 0;
            right: 0;
            z-index: 1000;
            justify-content: center;
            pointer-events: none;
        }

        .pill-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 2px solid #000;
            border-radius: 9999px;
            padding: 4px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15), 4px 4px 0 #000;
            pointer-events: auto;
            gap: 4px;
        }

        .pill-btn {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.62rem;
            font-weight: 800;
            text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            color: #64748b;
        }

        .pill-btn.active {
            background: #000;
            color: #fff;
        }

        .pill-btn-more {
            background: var(--p-yellow);
            color: #000;
            border: 1px solid #000;
        }

        /* Fullscreen Actions Modal */
        #actions-modal {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        #actions-modal.active {
            display: flex;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .m-action-btn {
            background: #fff;
            border: 3px solid #000;
            border-radius: 16px;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 6px 6px 0 #000;
        }

        .m-action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        .m-action-btn i {
            font-size: 1.8rem;
        }

        .m-action-btn span {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .m-btn-run {
            background: var(--p-green);
        }

        .m-btn-vis {
            background: var(--p-blue);
        }

        .m-section-label {
            width: 100%;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            margin-bottom: 12px;
            margin-top: 24px;
        }

        .m-lang-switcher {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .m-lang-switcher .lang-pill {
            position: relative;
            padding: 8px 14px;
            border: 2px solid #000;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 800;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 3px 3px 0 #000;
        }

        .m-lang-switcher .lang-pill.active {
            background: #000;
            color: #fff;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }

        .modal-close {
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 800;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Paper Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>

<body>



    <header>
        <div class="header-left">
            <a href="../" class="logo-wrap">
                <span class="logo-text">Undrstanding</span>
                <div class="logo-badge">VisuaLabs</div>
            </a>
        </div>
        <div class="controls">
            <div class="language-switcher">
                <div class="switcher-highlight" id="switcher-highlight"></div>
                <div class="lang-pill active" data-lang="python">PYTHON</div>
                <div class="lang-pill" data-lang="javascript">JAVASCRIPT</div>
                <div class="lang-pill" data-lang="cpp">C++</div>
                <div class="lang-pill" data-lang="java">JAVA</div>
            </div>
            <button id="run-btn" class="btn btn-run">
                <i class="bi bi-play-fill"></i> Run
            </button>
            <button id="visualise-btn" class="btn btn-visualize">
                <i class="bi bi-eye-fill"></i> Visualise
            </button>
        </div>
    </header>

    <div class="mobile-nav">
        <div class="pill-toggle">
            <button class="pill-btn active" id="pill-editor" onclick="switchMobileTab('editor')">Editor</button>
            <button class="pill-btn" id="pill-console" onclick="switchMobileTab('console')">Console</button>
            <button class="pill-btn" id="pill-view" onclick="switchMobileTab('view')">View</button>
            <button class="pill-btn pill-btn-more" onclick="toggleActions(true)">Actions</button>
        </div>
    </div>

    <!-- Mobile Actions Modal -->
    <div id="actions-modal">
        <h2
            style="font-family:'Outfit',sans-serif;font-weight:900;font-size:1.5rem;margin-bottom:32px;text-transform:uppercase;letter-spacing:-0.5px;">
            IDE Actions</h2>
        <div class="m-section-label">Select Language</div>
        <div class="m-lang-switcher">
            <div class="lang-pill active" data-lang="python">PYTHON</div>
            <div class="lang-pill" data-lang="javascript">JAVASCRIPT</div>
            <div class="lang-pill" data-lang="cpp">C++</div>
            <div class="lang-pill" data-lang="java">JAVA</div>
        </div>

        <div class="m-section-label">Commands</div>
        <div class="modal-grid">
            <div class="m-action-btn m-btn-run" onclick="triggerAction('run')">
                <i class="bi bi-play-circle-fill"></i>
                <span>Run Code</span>
            </div>
            <div class="m-action-btn m-btn-vis" onclick="triggerAction('visualise')">
                <i class="bi bi-eye-fill"></i>
                <span>Visualise</span>
            </div>
        </div>
        <div class="modal-close" onclick="toggleActions(false)">CLOSE MENU</div>
    </div>

    <main class="workspace">
        <!-- Left: Editor + Console -->
        <section class="panel-left active" id="panel-left">
            <div class="editor-container-wrapper" id="panel-editor-wrap">
                <div class="panel-header">
                    <div class="header-title-wrap">
                        <i class="bi bi-file-earmark-code" style="color:#94a3b8"></i> Editor
                    </div>
                </div>
                <div id="editor-container"></div>

            if (!x) return x;
            if (typeof x.toJs === 'function') return x.toJs({ depth: 1 });
            if (Array.isArray(x)) return x;
            if (x[Symbol.iterator]) return [...x];

            const after = toArr(rawArr).slice();
            const before = after.slice();
            before[i] = after[j];
            before[j] = after[i];

        // ---------------------------------------------------------------------------

        // ---------------------------------------------------------------------------
        async function captureHighlight(rawArr, indices) {
            try {
                // Use Array.from for maximum robustness with Pyodide PyProxy objects
                const jsArr = Array.from(typeof rawArr.toJs === 'function' ? rawArr.toJs() : rawArr);
                const jsIdx = indices
                    ? Array.from(typeof indices.toJs === 'function' ? indices.toJs() : indices)
                    : [];
                if (!jsArr.length) return;
                
                // --- DE-DUPLICATION: Don't push identical frames ---
                if (frames.length > 0) {
                    const last = frames[frames.length - 1];
                    if (JSON.stringify(last.data) === JSON.stringify(jsArr) && 
                        JSON.stringify(last.highlight) === JSON.stringify(jsIdx)) {
                        return; // Identical, skip.
                    }
                }

                frames.push({ type: 'highlight', data: jsArr, highlight: jsIdx });

        // ---------------------------------------------------------------------------

        // ---------------------------------------------------------------------------
        function renderBarsSearch(arr, indices) {
            if (!Array.isArray(arr) || !arr.length) return;
            const vc = document.getElementById('vis-content');
            if (!vc) return;
            vc.innerHTML = '';
            vc.className = 'vis-stage';

            const left = indices[0] !== undefined ? indices[0] : -1;
            const mid = indices[1] !== undefined ? indices[1] : -1;
            const right = indices[2] !== undefined ? indices[2] : -1;
            const found = indices[3] !== undefined ? indices[3] : -1;

            arr.forEach(function (val, idx) {
                const wrap = document.createElement('div');
                wrap.className = 'bar-container'; // Reuse container for spacing
                wrap.style.height = 'auto';

                const square = document.createElement('div');
                square.className = 'square';
                square.textContent = val;

                // Found state takes precedence
                if (idx === found) {
                    square.classList.add('found');
                    const f_lbl = document.createElement('div');
                    f_lbl.className = 'square-label';
                    f_lbl.style.color = '#16a34a'; f_lbl.textContent = 'FOUND';
                    square.appendChild(f_lbl);
                } else {
                    // Custom labels for Binary Search
                    if (idx === mid) {
                        square.classList.add('swap-candidate'); 
                        square.setAttribute('data-pointer', 'MID');
                        const m = document.createElement('div');
                        m.className = 'square-label'; m.textContent = 'MID';
                        square.appendChild(m);
                    } else if (idx === left) {
                        const l = document.createElement('div');

                        square.appendChild(l);
                    } else if (idx === right) {
                        const r = document.createElement('div');
                        r.className = 'square-label'; r.textContent = 'R';
                        square.appendChild(r);
                    }
                    
                    if (idx === left || idx === right) {
                        square.classList.add('comparing');
                    }
                }

                if (left !== -1 && right !== -1 && (idx < left || idx > right)) {
                    square.style.opacity = '0.15';
                    square.style.filter = 'grayscale(1)';
                    square.style.transform = 'scale(0.85)';
                }

                wrap.appendChild(square);
                vc.appendChild(wrap);
            });

        // ---------------------------------------------------------------------------

        // ---------------------------------------------------------------------------
        let isAnimating = false;

        async function animateFrame(f) {
            // Square Search View
            if (f.type === 'searching') {
                renderBarsSearch(f.data, f.highlight);
                await new Promise(function (r) { setTimeout(r, 800); });
                return;
            }

            // Bar View (Sorting or sorted state)
            if (f.type !== 'swap') {

                showFrame(currentFrame);
                // Pause so user can see pointers before continuing
                await new Promise(function (r) { setTimeout(r, 600); });

            // Step 1: render pre-swap state — all bars normal except both swap targets
            renderBars(f.before, [], []);
            const containers = vc.querySelectorAll('.bar-container');
            const ci = containers[i];
            const cj = containers[j];
            if (!ci || !cj) { renderBars(f.data, [], []); return; }

            // Highlight both as swap-candidate (orange, same color, distinct from blue rest)
            ci.querySelector('.bar').classList.add('swap-candidate');
            cj.querySelector('.bar').classList.add('swap-candidate');

            // Step 2: hold so user can see which two are targeted
            await new Promise(function (r) { setTimeout(r, 200); });

            // Step 3: measure pixel gap and slide them past each other
            const ri = ci.getBoundingClientRect();
            const rj = cj.getBoundingClientRect();
            const dx = rj.left - ri.left;

            const DUR = 260;
            const ease = 'cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            ci.style.transition = 'transform ' + DUR + 'ms ' + ease;
            cj.style.transition = 'transform ' + DUR + 'ms ' + ease;
            ci.style.transform = 'translateX(' + dx + 'px)';
            cj.style.transform = 'translateX(' + (-dx) + 'px)';

            // Step 4: wait for slide to finish, then render clean post-swap state
            await new Promise(function (r) { setTimeout(r, DUR + 40); });
            renderBars(f.data, [], []);

                    const ml = (currentLang === 'python' || currentLang === 'javascript') ? currentLang : 'cpp';
                    monaco.editor.setModelLanguage(editor.getModel(), ml);
                    editor.setValue(DEFAULTS[currentLang] || '');
                }
                log('Switched to ' + currentLang.toUpperCase());
                if (currentLang === 'python') startPython();
            });
        });

        /**
         * Initialization Sequence
         */
        window.addEventListener('load', function () {
            // 1. Initial UI setup
            checkDesktopView();
            clearConsole();

            // 2. Language pill highlight settling
            setTimeout(() => updateHighlight(document.querySelector('.lang-pill.active')), 100);
            setTimeout(() => updateHighlight(document.querySelector('.lang-pill.active')), 1000);
        });

        // ---------------------------------------------------------------------------
        //  Python Runtime (Pyodide)
        // ---------------------------------------------------------------------------
        async function startPython() {
            if (pyodide) return;
            log('Loading Python runtime...');
            try {
                pyodide = await loadPyodide({
                    indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/',
                    stdout: function (msg) { log(msg); },
                    stderr: function (msg) { log(msg, true); }
                });
                pyodide.globals.set('renderBars', window.renderBars);
                pyodide.globals.set('swap', window.liveSwap);
                pyodide.globals.set('highlight', window.liveHighlight);
                log('Python runtime ready.');
            } catch (e) {
                log('Python failed to load: ' + e, true);
            }
        }
        startPython();

        // ---------------------------------------------------------------------------
        //  Hook helpers
        // ---------------------------------------------------------------------------
        function setLiveHooks() {
            if (!pyodide) return;
            pyodide.globals.set('renderBars', window.renderBars);
            pyodide.globals.set('swap', window.liveSwap);
            pyodide.globals.set('highlight', window.liveHighlight);
        }
        function setCaptureHooks() {
            if (!pyodide) return;
            // For Python, we use the auto-tracer (sys.settrace) as the source of truth.
            // Manual hooks are made no-ops during capture to prevent duplicate frames.
            pyodide.globals.set('renderBars', function () { });
            pyodide.globals.set('swap', function () { return Promise.resolve(); });
            pyodide.globals.set('highlight', function () { return Promise.resolve(); });
        }
        function setNoopHooks() {
            if (!pyodide) return;
            pyodide.globals.set('renderBars', function () { });
            pyodide.globals.set('swap', function () { return Promise.resolve(); });
            pyodide.globals.set('highlight', function () { return Promise.resolve(); });
        }

        function clearVisualizer() {
            const vc = document.getElementById('vis-content');
            if (vc) {
                vc.innerHTML = `
                    <div style="text-align:center;opacity:0.1;">
                        <i class="bi bi-diagram-3" style="font-size:3rem;"></i>
                        <p style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;margin-top:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;">Ready</p>
                    </div>`;
            }
            showStepControls(false);
        }

        // ---------------------------------------------------------------------------
        //  RUN Button — plain code execution, text output only, no animation
        // ---------------------------------------------------------------------------
        document.getElementById('run-btn').addEventListener('click', async function () {
            if (!editor) return;
            const code = editor.getValue();
            const area = document.getElementById('console-output');
            if (area) area.innerHTML = ''; 
            log('Starting execution...');
            stopPlay();
            clearVisualizer();
            runType = 'plain';
            try {
                if (currentLang === 'javascript') {
                    try {
                        const pSwap = window.swap;
                        const pRender = window.renderBars;
                        const pHigh = window.highlight;
                        
                        // No-op hooks during plain run
                        window.swap = function () { return Promise.resolve(); };
                        window.highlight = function () { return Promise.resolve(); };
                        window.renderBars = function () { };
                        
                        const pLog = console.log;
                        const pPrint = window.print;
                        
                        console.log = function () {
                            const val = Array.from(arguments).map(arg => {
                                if (typeof arg === 'object') return JSON.stringify(arg, null, 2);
                                return String(arg);
                            }).join(' ');
                            log(val);
                        };
                        window.print = console.log;
                        
                        await eval('(async function(){ ' + code + ' \n})()');
                        
                        console.log = pLog;
                        window.print = pPrint;
                        window.swap = pSwap;
                        window.renderBars = pRender;
                        window.highlight = pHigh;
                        log('Execution finished.', 'status');
                    } catch (e) { log('Error: ' + e.message, true); }

                } else if (currentLang === 'python') {
                    if (!pyodide) { log('Waiting for Python...'); await startPython(); }
                    log('Running Python...');
                    setNoopHooks();
                    try { await pyodide.runPythonAsync(code); }
                    catch (e) { log(String(e), true); }
                    setLiveHooks();

                } else {
                    log(currentLang.toUpperCase() + ' - simulation mode (no remote compiler).');
                }
            } finally {
                runType = null;
            }
        });

        // ---------------------------------------------------------------------------
        //  VISUALISE Button — capture all frames, then enable step controls
        // ---------------------------------------------------------------------------
        document.getElementById('visualise-btn').addEventListener('click', async function () {
            if (!editor) return;
            const code = editor.getValue();
            const area = document.getElementById('console-output');
            if (area) area.innerHTML = ''; // Fresh console for new capture
            log('Capture starting...');
            stopPlay();
            showStepControls(false);

            if (currentLang.startsWith('python')) {
                if (!pyodide) { log('Waiting for Python...'); await startPython(); }
                log('Analysing logic...');
                frames = [];
                currentFrame = -1;
                showStepControls(false);

                // Inject a sys.settrace auto-tracer that instruments user code with zero modifications.
                // It watches every executed line for: numeric list variables (the array) and integer
                // variables with common pointer names (left, right, mid, i, j, lo, hi, ...).
                await pyodide.runPythonAsync(`
import sys as _sys
_vis_frames = []
_vis_last   = [None, None]    # [prev_data, prev_ptrs]
_VIS_PTR = frozenset([
    'left','right','mid','lo','hi','low','high',
    'l','r','m','start','end','begin','target'
])

def _vis_trace(frame, event, arg):
    global _vis_has_swaps
    if event != 'line' or len(_vis_frames) >= 500:
        return _vis_trace
    # Only trace the user's own code frames, not Pyodide internals
    if frame.f_code.co_filename not in ('<exec>', '<string>'):
        return _vis_trace
    locs = frame.f_locals
    # Find the first numeric list in locals (the array being worked on)
    arr = next(
        (v for v in locs.values()
         if isinstance(v, list) and 2 <= len(v) <= 200
         and all(isinstance(x, (int, float)) for x in v)),
        None
    )
    if arr is None:
        return _vis_trace
    data = list(arr)
    # Fixed-size pointer array for searching: [left, mid, right, found]
    v_left  = locs.get('left', locs.get('lo', -1))
    v_right = locs.get('right', locs.get('hi', -1))
    v_mid   = locs.get('mid', locs.get('m', -1))
    v_found = -1

    target = locs.get('target', locs.get('targetVal', locs.get('x')))
    if target is not None and isinstance(target, (int, float)):
        if isinstance(v_mid, int) and 0 <= v_mid < len(arr):
            if arr[v_mid] == target:
                v_found = v_mid
    
    # Pack into standard format
    search_ptrs = [
        v_left if isinstance(v_left, int) else -1,
        v_mid if isinstance(v_mid, int) else -1,
        v_right if isinstance(v_right, int) else -1,
        v_found
    ]

    prev = _vis_last[0]
    if data == prev and search_ptrs == _vis_last[1]:
        return _vis_trace   # nothing changed, skip

    # Detect swap...
    changed = ([] if prev is None
               else [i for i in range(min(len(data), len(prev))) if data[i] != prev[i]])
    if len(changed) == 2:
        a, b = changed
        if prev and data[a] == prev[b] and data[b] == prev[a]:
            _vis_has_swaps = True
            _vis_frames.append({'type':'swap', 'before':prev[:], 'data':data[:], 'highlight':[a,b]})
            _vis_last[0] = data[:]
            _vis_last[1] = search_ptrs[:]
            return _vis_trace

    # Default: highlight frame
    _vis_frames.append({'type':'highlight', 'data':data[:], 'highlight':search_ptrs})
    _vis_last[0] = data[:]
    _vis_last[1] = search_ptrs[:]
    return _vis_trace

_vis_has_swaps = False
_sys.settrace(_vis_trace)
`);
                try { await pyodide.runPythonAsync(code); }
                catch (e) { log(String(e), true); }
                await pyodide.runPythonAsync('_sys.settrace(None)');

                // Transfer captured frames from Python list-of-dicts → JS frames[]
                try {
                    const pyList = pyodide.globals.get('_vis_frames');
                    const pyHasSwp = pyodide.globals.get('_vis_has_swaps');
                    const rawItems = pyList.toJs({ depth: 8 });

                    pyList.destroy();
                    (rawItems || []).forEach(function (m) {
                        if (!(m instanceof Map)) return;
                        const f = {
                            type: String(m.get('type') || 'highlight'),
                            data: Array.from(m.get('data') || []).map(Number),
                            highlight: Array.from(m.get('highlight') || []).map(Number)
                        };
                        // FORCE: If any swap happened in the whole script, we treat everything as SORT (Bar View)
                        if (pyHasSwp) {
                            if (f.type !== 'swap') f.type = 'sort_highlight';
                        } else {
                            f.type = 'searching'; // Standard search (Square View)
                        }

                        const before = m.get('before');
                        if (before) f.before = Array.from(before).map(Number);
                        frames.push(f);
                    });
                } catch (e) { log('Frame read error: ' + e, true); }

                setLiveHooks();

                if (!frames.length) {
                    log('No visualization data captured. Make sure your code has a numeric list variable.', true);
                    return;
                }
                log('Captured ' + frames.length + ' steps. Ready to play.', true);
                showStepControls(true);
                showFrame(0);
                return;
            }


            if (currentLang.startsWith('javascript')) {
                frames = [];
                currentFrame = -1;
                jsAnySwaps = false; 
                log('Analysing logic...');

                // Grab initial array state (greedy match)
                const m = code.match(/\[[^]*?\]/);
                if (m) {
                    try {
                        const init = JSON.parse(m[0].replace(/\s/g, '').replace(/,(\]|})/g, '$1'));
                        frames.push({ data: init.slice(), highlight: [] });
                    } catch (_) { }
                }

                const pRender = window.renderBars;
                const pSwap = window.swap;
                const pHigh = window.highlight;

                window.renderBars = function () { }; // Silence during capture
                window.swap = captureSwap;
                window.highlight = function(data, ptrs) {
                    const frame = { data: data.slice(), highlight: ptrs };
                    const last = frames[frames.length - 1];
                    if (last && JSON.stringify(last.data) === JSON.stringify(frame.data) && JSON.stringify(last.highlight) === JSON.stringify(frame.highlight)) return;
                    frames.push(frame);
                };

                // --- REFINED: IN-SCOPE CAPTURE SYSTEM ---
                let traceCode = code;
                try {
                    // Detect the main target array (Identify literals or common names)
                    const arrMatch = code.match(/(?:const|let|var|[\w$]+)?\s*([\w$]+)\s*=\s*\[[^]*?\]/i);
                    const arrName = arrMatch ? arrMatch[1] : (code.includes('arr') ? 'arr' : (code.includes('data') ? 'data' : null));

                    if (arrName) {
                        const lines = code.split('\n');
                        const instrumented = lines.map(line => {
                            const tr = line.trim();
                            if (!tr || tr.startsWith('/') || tr.startsWith('*')) return line;
                            
                            // Key synchronization points (Assignments to pointers or loop starts)
                            const isSync = /(=|\{)/.test(tr) && (tr.includes('left') || tr.includes('right') || tr.includes('mid') || tr.includes('lo') || tr.includes('hi'));
                            const isReturn = tr.includes('return');
                            
                            if (isSync || isReturn) {
                                // Prepend or append the capture call?
                                // Assignments: Append. Returns: Prepend.
                                if (isReturn) return ` ; await __visCapture(); ` + "\n" + line;
                                return line + ` \n ; await __visCapture(); `;
                            }
                            return line;
                        }).join('\n');

                        // Wrap with scope-aware capture helper
                        traceCode = `
                            async function __visCapture() {
                                try {
                                    // Pointer Scraper with common search alias fallbacks
                                    const l = typeof left !== 'undefined' ? left : (typeof lo !== 'undefined' ? lo : (typeof low !== 'undefined' ? low : (typeof L !== 'undefined' ? L : -1)));
                                    const m = typeof mid !== 'undefined' ? mid : (typeof mid_val !== 'undefined' ? mid_val : (typeof M !== 'undefined' ? M : -1));
                                    const r = typeof right !== 'undefined' ? right : (typeof hi !== 'undefined' ? hi : (typeof high !== 'undefined' ? high : (typeof R !== 'undefined' ? R : -1)));
                                    const f = typeof found !== 'undefined' ? found : -1;
                                    await window.highlight(${arrName}, [l, m, r, f]);
                                } catch(e){}
                            }
                            ${instrumented}
                        `;
                    }
                } catch(e) { }

                try { await eval('(async function(){ ' + traceCode + ' \n})()'); }
                catch (e) { log(e.message, true); }

                window.renderBars = pRender;
                window.swap = pSwap;
                window.highlight = pHigh;

                if (frames.length <= 1) {
                    log('No visualization steps captured. Ensure your data array is defined at the top as an array literal (e.g., const data = [...]).', 'status');
                }
                log('Captured ' + frames.length + ' steps. Ready to play.', true);
                
                // Automatic Type Detection: Sort (Bars) vs Search (Squares)
                frames.forEach(f => {
                    if (jsAnySwaps) {
                        if (f.type !== 'swap') f.type = 'sort_highlight';
                    } else {
                        f.type = 'searching';
                    }
                });

                log('Captured ' + frames.length + ' steps. Ready to play.', true);
                showStepControls(true);
                showFrame(0);
                return;
            }

            log(currentLang.toUpperCase() + ' - visualization in simulation mode.');
        });
    </script>
    <script src="../content/js/script.js"></script>
</body>

</html>
