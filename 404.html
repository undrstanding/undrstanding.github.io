<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="icon" type="image/svg+xml" href="assests/undrlogo.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@900&family=JetBrains+Mono&display=swap');

        :root {
            --galaxy-deep: #050505;
            --galaxy-nebula: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--galaxy-deep);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Galaxy Background Animation */
        .galaxy-container {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--galaxy-nebula) 0%, var(--galaxy-deep) 100%);
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        /* Minimal Content Wrapper */
        .content-wrapper {
            max-width: 600px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            line-height: 0.8;
            margin-bottom: 2rem;
            letter-spacing: -5px;
            opacity: 0.9;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-weight: 700;
            opacity: 0.4;
            margin-bottom: 1.5rem;
            display: block;
        }

        .message-title {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            color: #eee;
        }

        .message-description {
            font-size: 1rem;
            color: #888;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #000;
            padding: 1rem 2.5rem;
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            border: 3px solid #000;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.15s ease;
            position: relative;
        }

        .home-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #000;
        }

        .home-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px #000;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .message-title {
                font-size: 1.4rem;
            }

            .message-description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="galaxy-container" id="stars-container"></div>

    <div class="content-wrapper">
        <span class="mono">Error: Path Not Found</span>
        <h1 class="error-code">404</h1>

        <h2 class="message-title">Knowledge is vast,<br>but the website is not.</h2>

        <p class="message-description">
            You've reached the boundary of our explored sector. Orbit back to safety or continue your search elsewhere.
        </p>

        <a href="../" class="home-btn">
            Return to Undrstanding
        </a>
    </div>

    <script>
        // Generate stars dynamically
        const container = document.getElementById('stars-container');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 2 + 1;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;

            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${duration}s`);
            star.style.animationDelay = `${delay}s`;

            container.appendChild(star);
        }

        // Add some "Nebula" drift elements
        for (let i = 0; i < 5; i++) {
            const drift = document.createElement('div');
            drift.className = 'absolute opacity-10 pointer-events-none rounded-full blur-[100px]';
            const colors = ['#abc2fe', '#ffc570', '#eb4c4c', '#4f46e5'];
            drift.style.background = colors[i % colors.length];
            drift.style.width = `${Math.random() * 300 + 200}px`;
            drift.style.height = drift.style.width;
            drift.style.left = `${Math.random() * 100}%`;
            drift.style.top = `${Math.random() * 100}%`;
            container.appendChild(drift);
        }
    </script>
</body>

</html>
