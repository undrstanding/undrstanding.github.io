        .card-container {
            position: relative;

            flex: 1;
            max-height: 780px;
            min-height: 380px;
            perspective: 1000px;
            margin: 0.5rem 0;
            z-index: 10;

        .card {
            position: absolute;
            inset: 0;
            background: var(--mac-beige);
            border: 8px solid var(--neo-border);
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow:
                inset -6px -6px 0 var(--mac-bezel),

            cursor: grab;
            user-select: none;
            overflow: hidden;
            z-index: 10;
            transition: transform 0.1s ease-out, opacity 0.2s;
        }

        /* Macintosh Vent Effect */
        .card::after {
            content: "";
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 15px;
            background-image: repeating-linear-gradient(to right, #000 0px, #000 2px, transparent 2px, transparent 6px);

            opacity: 0;

            height: 100%;
            background: var(--neo-border);
            width: 100%;
            transform-origin: left;
            transition: transform 0.1s linear;
            border-radius: 1rem;

        }

        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;

            left: 0;
            bottom: 0;
            right: 0;

        .crt-screen::after {

        @keyframes terminal-static {
            0% {

            10% {
                transform: translate(-1px, 1px) opacity(0.9);
            }

            20% {
                transform: translate(1px, -1px) opacity(1);
            }

            30% {
                transform: translate(-1px, -1px) opacity(0.8);
            }

            40% {
                transform: translate(1px, 1px) opacity(1);
            }

            50% {
                transform: translate(-1px, 0.5px) opacity(0.9);
            }

            60% {
                transform: translate(1px, -0.5px) opacity(1);
            }

            100% {
                transform: translate(0) opacity(1);
            }
        }

        .glitch-terminal {
            animation: terminal-static 0.2s infinite;
            filter: contrast(1.5) brightness(1.2);
        }

        .output-unreliable {
            background-color: #1a0a0a !important;
            border-color: #8a221a !important;
            color: #ff4d4d !important;
            position: relative;
        }

        /* Broken Screen Slash */
        .output-unreliable::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(115deg, transparent 48%, rgba(255, 255, 255, 0.15) 49%, rgba(0, 0, 0, 0.3) 50%, rgba(255, 255, 255, 0.15) 51%, transparent 52%);
            pointer-events: none;
            z-index: 10;
        }

    <script>
        const gameContainer = document.getElementById('game-container');
        const timerProgress = document.getElementById('timer-progress');
        const digitalTimer = document.getElementById('digital-timer');
        const timerText = document.getElementById('timer-text');
        const streakDisplay = document.getElementById('streak-count');
        const gameOverScreen = document.getElementById('game-over');
        const deathReason = document.getElementById('death-reason');
        const finalStreakDisplay = document.getElementById('final-streak');
        const btnCrashTrigger = document.getElementById('btn-crash-trigger');
        const btnCorrectTrigger = document.getElementById('btn-correct-trigger');

        let streak = 0;
        let timeLeftLimit = 10;
        let timerInterval = null;
        let isGameOver = false;
        let currentActiveCard = null;

        const SNIPPETS = [
            { code: "const x = [1, 2];\nx.push(3);\nconsole.log(x.length);", output: "3", isCorrect: true },
            { code: "console.log(typeof NaN);", output: "number", isCorrect: true },
            { code: "const a = {};\nconsole.log(a.user.name);", output: "TypeError", isCorrect: false },
            { code: "let x = 10;\n{ let x = 5; }\nconsole.log(x);", output: "10", isCorrect: true },
            { code: "console.log(0.1 + 0.2 === 0.3);", output: "false", isCorrect: true },
            { code: "const p = null;\nconsole.log(p.value);", output: "Crash", isCorrect: false },
            { code: "console.log('5' - 3);", output: "2", isCorrect: true },
            { code: "console.log('5' + 3);", output: "53", isCorrect: true },
            { code: "function f() { return f(); }\nf();", output: "Stack Overflow", isCorrect: false },
            { code: "const arr = [1,2,3];\narr[10] = 99;\nconsole.log(arr.length);", output: "11", isCorrect: true },
            { code: "JSON.parse('hello');", output: "SyntaxError", isCorrect: false },
            { code: "console.log(1 < 2 < 3);", output: "true", isCorrect: true },
            { code: "console.log(3 > 2 > 1);", output: "false", isCorrect: true },
            { code: "const x = 5;\nx = 6;", output: "TypeError", isCorrect: false },
            { code: "console.log([] == ![]);", output: "true", isCorrect: true },
            { code: "const a = undefined;\nconsole.log(a[0]);", output: "Crash", isCorrect: false },
            { code: "let y;\nconsole.log(y);", output: "undefined", isCorrect: true },
            { code: "console.log(Math.max());", output: "-Infinity", isCorrect: true },
            { code: "eval('alert(');", output: "SyntaxError", isCorrect: false },
            { code: "const obj = { a: 1 };\nconsole.log('b' in obj);", output: "false", isCorrect: true },
            { code: "const [a, ...b] = [1,2,3];\nconsole.log(b);", output: "[2, 3]", isCorrect: true },
            { code: "parseInt('10.5')", output: "10", isCorrect: true },
            { code: "Number.isNaN('hello')", output: "false", isCorrect: true },
            { code: "const x = 1n;\nconsole.log(x + 1);", output: "TypeError", isCorrect: false },
            { code: "console.log(typeof null);", output: "object", isCorrect: true },
            { code: "const f = () => {};\nconsole.log(f.name);", output: "f", isCorrect: true }
        ];

        function highlightCode(code) {
            // Highlighting colors (Phosphor/Dracula theme)
            const colors = {
                keyword: '#FF79C6',
                string: '#F1FA8C',
                number: '#BD93F9',
                comment: '#6272A4',
                builtin: '#50FA7B',
                constant: '#8BE9FD',
                base: '#f0f6fc' // High-contrast base for all other characters
            };

            // Wrap the whole code in a base color first to ensure NO black text
            let h = code;

            h = h
                // Comments
                .replace(/(\/\/.+)/g, (m) => `<span style="color: ${colors.comment}">${m}</span>`)
                // Strings
                .replace(/(['"`])(.*?)\1/g, (m) => `<span style="color: ${colors.string}">${m}</span>`)
                // Keywords
                .replace(/\b(const|let|var|function|return|if|else|for|while|try|catch|new|delete|typeof|in|instanceof|throw|await|async|export|import)\b/g, (m) => `<span style="color: ${colors.keyword}">${m}</span>`)
                // Built-ins/Global objects
                .replace(/\b(console|Math|NaN|Infinity|undefined|null|true|false|TypeError|Error|Array|Object|String|Number|JSON|parseInt|setTimeout)\b/g, (m) => `<span style="color: ${colors.builtin}">${m}</span>`)
                // Numbers
                .replace(/\b(\d+n?)\b/g, (m) => `<span style="color: ${colors.number}">${m}</span>`);

            return `<span style="color: ${colors.base}">${h}</span>`;
        }

        function getTimeForLevel(s) {
            if (s < 25) return 10;
            if (s < 50) return 7;
            if (s < 75) return 5;
            return 3;
        }

        function createCard() {

            const card = document.createElement('div');
            card.className = 'card neo-card-border p-5 md:p-7';
            card.innerHTML = `
                <div class="overlay overlay-correct uppercase">Correct</div>

                <div class="flex-1 flex flex-col h-full overflow-hidden relative">
                    <div class="text-[0.6rem] font-bold uppercase mb-2 tracking-widest opacity-60 text-center">System Monitor</div>
                    
                    <!-- Main CRT Screen -->
                    <div class="flex-1 crt-screen p-4 md:p-6 rounded-xl border-4 border-black/20 overflow-hidden text-[0.85rem] md:text-[0.95rem] code-font no-scrollbar whitespace-pre-wrap break-words leading-relaxed shadow-inner text-left flex flex-col justify-start items-start">
                        <div class="relative z-10 w-full text-left">${highlightCode(snippet.code.trim())}</div>
                    </div>

                    <!-- Macintosh Bezel Details (Floppy, Speaker, Buttons) -->
                    <div class="mt-6 pt-6 border-t-4 border-black/10 flex flex-col gap-4">
                        <div class="flex items-center justify-between px-2">
                             <!-- Floppy Slot -->
                             <div class="w-32 h-3 bg-black/20 rounded-sm shadow-[inset_0_2px_4px_rgba(0,0,0,0.3)] border border-black/10"></div>
                             
                             <!-- Speaker Grille -->
                             <div class="grid grid-cols-4 gap-1 opacity-20">
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                                 <div class="w-1.5 h-1.5 bg-black rounded-full"></div>
                             </div>
                        </div>

                        <div class="flex justify-between items-center px-2">
                             <!-- Ventilation Slits -->
                             <div class="flex gap-1.5">
                                 <div class="w-1 h-6 bg-black/10 rounded-full"></div>
                                 <div class="w-1 h-6 bg-black/10 rounded-full"></div>
                                 <div class="w-1 h-6 bg-black/10 rounded-full"></div>
                                 <div class="w-1 h-6 bg-black/10 rounded-full"></div>
                                 <div class="w-1 h-6 bg-black/10 rounded-full"></div>
                             </div>

                             <!-- Knobs/Buttons -->
                             <div class="flex gap-3">
                                 <div class="w-6 h-6 rounded-full bg-black/10 border-2 border-black/20 flex items-center justify-center shadow-sm">
                                     <div class="w-1 h-3 bg-black/20 rounded-full rotate-45"></div>
                                 </div>
                                 <div class="w-6 h-6 rounded-lg bg-black/10 border-2 border-black/20 flex items-center justify-center shadow-sm">
                                     <div class="w-2 h-2 rounded-full bg-red-600/30 animate-pulse"></div>
                                 </div>
                             </div>
                        </div>
                    </div>

                    <div class="text-[0.5rem] font-black uppercase mt-4 tracking-widest opacity-30 text-center">Undrstanding Games</div>
                </div>
            `;

            card.dataset.isCorrect = snippet.isCorrect;
            initSwipe(card);
            return card;
        }

        function initSwipe(card) {
            let startX = 0;
            let currentX = 0;
            let isDragging = false;

            const onStart = (e) => {
                if (isGameOver) return;
                startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                isDragging = true;
                card.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!isDragging) return;
                currentX = (e.type.includes('touch') ? e.touches[0].clientX : e.clientX) - startX;
                const rotation = currentX / 15;
                const scale = 1 - (Math.abs(currentX) / 2000);
                card.style.transform = `translateX(${currentX}px) rotate(${rotation}deg) scale(${scale})`;

                const correctOverlay = card.querySelector('.overlay-correct');
                const crashOverlay = card.querySelector('.overlay-crash');

                if (currentX > 40) {
                    correctOverlay.style.opacity = Math.min(currentX / 120, 1);
                    crashOverlay.style.opacity = 0;
                } else if (currentX < -40) {
                    crashOverlay.style.opacity = Math.min(Math.abs(currentX) / 120, 1);
                    correctOverlay.style.opacity = 0;
                } else {
                    correctOverlay.style.opacity = 0;
                    crashOverlay.style.opacity = 0;
                }
            };

            const onEnd = () => {
                if (!isDragging) return;
                isDragging = false;
                card.style.transition = 'all 0.4s cubic-bezier(0.23, 1, 0.32, 1)';

                if (currentX > 110) {
                    handleChoice(card, true);
                } else if (currentX < -110) {
                    handleChoice(card, false);
                } else {
                    card.style.transform = 'translateX(0) rotate(0) scale(1)';
                    card.querySelector('.overlay-correct').style.opacity = 0;
                    card.querySelector('.overlay-crash').style.opacity = 0;
                }
            };

            card.addEventListener('mousedown', onStart);
            card.addEventListener('touchstart', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        function handleChoice(card, choice) {
            if (isGameOver || !card) return;
            const isSnippetCorrect = card.dataset.isCorrect === "true";

            if (choice === isSnippetCorrect) {
                streak++;
                streakDisplay.innerText = streak;
                card.classList.add(choice ? 'swiping-right' : 'swiping-left');

                // Trigger button feedback
                const triggerBtn = choice ? btnCorrectTrigger : btnCrashTrigger;
                triggerBtn.style.transform = "scale(1.2)";
                setTimeout(() => triggerBtn.style.transform = "", 150);

                setTimeout(() => {
                    card.remove();
                    nextTurn();
                }, 250);
            } else {
                card.remove(); // Clean up current choice card to prevent collision
                endGame(choice ? "THE CODE WOULD CRASH" : "THE CODE WAS CORRECT");
            }
        }

        function nextTurn() {
            if (isGameOver) return;

            timeLeftLimit = getTimeForLevel(streak);

            const newCard = createCard();
            gameContainer.appendChild(newCard);
            currentActiveCard = newCard;

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            const startTime = Date.now();
            const duration = timeLeftLimit * 1000;

            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, 1 - (elapsed / duration));

                timerProgress.style.transform = `scaleX(${remaining})`;
                const secs = (remaining * timeLeftLimit).toFixed(1);
                timerText.innerText = secs;

                // Level-aware warning (after half-time)
                const warningThreshold = timeLeftLimit / 2;
                if (secs <= warningThreshold) {
                    digitalTimer.style.color = "#FF007F";
                    timerText.classList.add('pulse-warn');
                    timerProgress.style.backgroundColor = "#FF007F";
                } else {
                    digitalTimer.style.color = "";
                    timerText.classList.remove('pulse-warn');
                    timerProgress.style.backgroundColor = "";
                }

                if (remaining <= 0) {
                    endGame("TIME EXPIRED");
                }
            }, 16);
        }

        function endGame(reason) {
            isGameOver = true;
            clearInterval(timerInterval);
            deathReason.innerText = reason;
            finalStreakDisplay.innerText = streak;

            // Ensure card cleanup is processed before showing modal
            requestAnimationFrame(() => {
                setTimeout(() => {
                    gameOverScreen.classList.remove('hidden');
                    gameOverScreen.classList.add('flex');
                }, 50);
            });
        }

        function resetGame() {
            streak = 0;
            isGameOver = false;
            streakDisplay.innerText = "0";
            timerText.innerText = "10.0";
            gameOverScreen.classList.add('hidden');
            gameOverScreen.classList.remove('flex');
            gameContainer.innerHTML = '';
            nextTurn();
        }

        // Functional Buttons Click Handlers
        if (btnCrashTrigger) {
            btnCrashTrigger.addEventListener('click', () => {
                if (currentActiveCard) handleChoice(currentActiveCard, false);
            });
        }

        if (btnCorrectTrigger) {
            btnCorrectTrigger.addEventListener('click', () => {
                if (currentActiveCard) handleChoice(currentActiveCard, true);
            });
        }

        // Security: Disable copy/paste and context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 's')) {
                e.preventDefault();
            }
        });

        // Initialize game
        nextTurn();
    </script>
</body>
