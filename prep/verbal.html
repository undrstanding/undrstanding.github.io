<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbal Communication | Assessment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="../assests/undrlogo.svg">

    <style>
        :root {
            --verbal-bg: #e8dbb3;
            --nb-yellow: #fef08a;
            --nb-blue: #bfdbfe;
            --nb-green: #bbf7d0;
            --nb-red: #fecaca;
            --slate-900: #0f172a;
        }

        html,
        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: var(--slate-900);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            overflow: hidden !important;
        }

        #app {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .nb-card {
            background: white;
            border: 1.5px solid var(--slate-900);
            border-radius: 10px;
            transition: all 0.2s;
        }

        .nb-button {
            border: 1.5px solid var(--slate-900);
            box-shadow: 2px 2px 0px var(--slate-900);
            transition: all 0.15s;
        }

        .nb-button:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0px var(--slate-900);
        }

        .nb-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .outfit {
            font-family: 'Outfit', sans-serif;
        }

        .audio-wave {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 40px;
        }

        .wave-bar {
            width: 3px;
            height: 20%;
            background: var(--slate-900);
            border-radius: 10px;
            transition: height 0.1s;
        }

        @keyframes vocal-wave {

            0%,
            100% {
                height: 30%;
                opacity: 0.4;
            }

            50% {
                height: 100%;
                opacity: 1;
            }
        }

        .animate-vocal-wave {
            animation: vocal-wave 0.7s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Hide Scrollbar Utility */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- Content will be injected by JavaScript -->
    </div>

    <div id="cheat-screen"
        class="fixed inset-0 bg-white z-[9999] hidden flex flex-col items-center justify-center p-12 text-center">
        <div class="max-w-md">
            <h1 class="text-4xl font-black outfit mb-4 text-red-600">Integrity Violation</h1>
            <p class="text-slate-500 mb-8 font-medium">Navigation outside the secure assessment environment is strictly
                prohibited. Your session history has been flagged.</p>
            <button onclick="location.reload()"
                class="nb-button px-8 py-3 bg-slate-900 text-white font-bold rounded">Resume
                Session</button>
        </div>
    </div>

                    { q: 'What do you call the building where you go to watch movies on a big screen?', a: ['cinema', 'theater', 'theatre', 'movie hall'] },
                    { q: 'If you want to buy medicine, do you go to a library or a pharmacy?', a: ['pharmacy', 'chemist', 'drugstore'] }
                ]
            },
            {
                id: 'SENTENCE_BUILD',
                title: 'Sentence Builds',
                instructions: 'Rearrange the following phrases into a logical sentence.',
                items: [
                    { q: 'for the meeting / we / are late', a: 'we are late for the meeting' },
                    { q: 'the report / read / carefully', a: 'read the report carefully' },
                    { q: 'always / the truth / speak', a: 'always speak the truth' },
                    { q: 'a new car / he / bought', a: 'he bought a new car' },
                    { q: 'to the library / they / went', a: 'they went to the library' },
                    { q: 'very hard / is working / she', a: 'she is working very hard' },
                    { q: 'to finish / the task / tried', a: 'tried to finish the task' },
                    { q: 'delicious / the meal / was', a: 'the meal was delicious' },
                    { q: 'is located / where / the nearest bank', a: 'where is the nearest bank located' },
                    { q: 'will arrive / the flight / on time', a: 'the flight will arrive on time' }
                ]
            }
        ];

        // --- Voice Processing Logic ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        const synthesis = window.speechSynthesis;

        if (recognition) {
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            let hasResult = false;

            recognition.onstart = () => {
                isRecording = true;
                hasResult = false;
                render();
            };

            recognition.onend = () => {
                isRecording = false;
                // Auto-skip if no speech detected in AUTO mode
                if (testData.micMode === 'AUTO' && !hasResult && state === 'TEST') {
                    setTimeout(() => {
                        if (!isRecording && !isPlaying && !hasResult) {
                            saveResponse('[NO_SPEECH]');
                        }
                    }, 500);
                }
                render();
            };

            recognition.onresult = (event) => {
                hasResult = true;
                const transcript = event.results[0][0].transcript;
                saveResponse(transcript);
            };

            recognition.onerror = (event) => {
                isRecording = false;
                console.error('Recognition Error:', event.error);
                if (testData.micMode === 'AUTO') {
                    setTimeout(() => saveResponse('[ERROR]'), 500);
                } else {
                    render();
                }
            };
        }

        function playPrompt(text, callback) {
            isPlaying = true;
            render();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.onend = () => {
                isPlaying = false;
                if (testData.micMode === 'AUTO') {
                    startRecording();
                } else if (callback) {
                    callback();
                } else {
                    render();
                }
            };
            synthesis.speak(utterance);
        }

        function startRecording() {
            if (!recognition) {
                alert('Speech recognition is not supported in this browser.');
                return;
            }
            try { recognition.start(); } catch (e) { console.error(e); }
        }

        // --- State Transitions ---
        function init() {
            render();
            // Integrity Listeners
            document.addEventListener('selectstart', (e) => e.preventDefault());
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            window.addEventListener('blur', () => { if (state === 'TEST') triggerViolation('Tab Switch'); });
            document.addEventListener('visibilitychange', () => { if (document.hidden && state === 'TEST') triggerViolation('Tab Switch'); });
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement && (state === 'TEST' || state === 'SECTION_INTRO' || state === 'TRANSITION')) {
                    state = 'WELCOME';
                    render();
                }
            });
        }

        function triggerViolation(reason) {
            testData.proctoring.totalViolations++;
            document.getElementById('cheat-screen').classList.remove('hidden');
        }

        function startTest() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Microphone access is required for this test.');
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    document.documentElement.requestFullscreen().catch(() => { });
                    state = 'SECTION_INTRO';
                    testData.startTime = Date.now();
                    render();
                })
                .catch(err => {
                    alert('Please allow microphone access to proceed.');
                });
        }

        function saveResponse(val) {
            const section = sections[currentSectionIdx];
            if (!testData.responses[currentSectionIdx]) testData.responses[currentSectionIdx] = [];
            testData.responses[currentSectionIdx][currentQuestionIdx] = val;
            nextItem();
        }

        function nextItem() {
            const section = sections[currentSectionIdx];
            currentPromptPlayed = false; // Reset for next

            if (currentQuestionIdx < section.items.length - 1) {
                currentQuestionIdx++;
                state = 'TRANSITION';
                render();
                setTimeout(() => {
                    state = 'TEST';
                    render();
                }, 1200);
            } else if (currentSectionIdx < sections.length - 1) {
                currentSectionIdx++;
                currentQuestionIdx = 0;
                state = 'SECTION_INTRO';
                render();
            } else {
                computeAnalysis();
                state = 'ANALYSIS';
                render();
            }
        }

        function stringSimilarity(s1, s2) {
            let w1 = s1.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w);
            let w2 = s2.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(w => w);
            if (w1.length === 0 || w2.length === 0) return 0;

            // Jaccard-like word matching
            const intersection = w1.filter(word => w2.includes(word)).length;
            const wordSim = intersection / Math.max(w1.length, w2.length);

            // Character matching fallback
            let c1 = s1.toLowerCase().replace(/[^\w\s]/g, '');
            let c2 = s2.toLowerCase().replace(/[^\w\s]/g, '');
            let longer = c1.length > c2.length ? c1 : c2;
            let shorter = c1.length > c2.length ? c2 : c1;
            let charSim = (longer.length - editDistance(longer, shorter)) / longer.length;

            return (wordSim * 0.7) + (charSim * 0.3);
        }

        function editDistance(s1, s2) {
            let costs = [];
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i == 0) costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (s1.charAt(i - 1) != s2.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        let analysis = null;
        function computeAnalysis() {
            let rawScore = 0;
            let totalPossible = 0;
            let catScores = {};
            let correctItemsCount = 0;
            let totalItemsCount = 0;

            sections.forEach((sec, sIdx) => {
                let secScore = 0;
                let responses = testData.responses[sIdx] || [];
                sec.items.forEach((item, iIdx) => {
                    totalPossible += 100;
                    totalItemsCount++;
                    let userResp = (responses[iIdx] || "").trim();

                    if (userResp === "[SKIPPED]" || userResp === "") {
                        secScore += 0;
                    } else if (sec.id === 'SHORT_ANSWER') {
                        let isCorrect = item.a.some(ans => userResp.toLowerCase().includes(ans.toLowerCase()));
                        if (isCorrect) {
                            secScore += 100;
                            correctItemsCount++;
                        }
                    } else {
                        let sim = stringSimilarity(userResp, item.a);
                        // Significant threshold improvement (40%) - anything below this is 0
                        if (sim > 0.4) {
                            secScore += sim * 100;
                            if (sim > 0.8) correctItemsCount++;
                        }
                    }
                });
                catScores[sec.title] = { score: secScore, total: sec.items.length * 100 };
                rawScore += secScore;
            });

            analysis = {
                score: Math.round((rawScore / totalPossible) * 100),
                accuracy: Math.round((correctItemsCount / totalItemsCount) * 100),
                categories: catScores
            };
        }

        function skip() {
            saveResponse('[SKIPPED]');
        }

                        </div>

                        <div class="w-full md:w-[65%] p-4 md:p-12 flex flex-col bg-white overflow-y-auto no-scrollbar">

                                            <p class="text-[11px] md:text-sm text-gray-500 mt-0.5 leading-relaxed">Ensure your microphone is connected and background noise is minimal.</p>
                                        </div>
                                    </li>

                                        <div class="w-6 h-6 md:w-8 md:h-8 rounded md:rounded-lg bg-black text-[#e8dbb3] flex items-center justify-center shrink-0 outfit font-bold text-xs md:text-base">2</div>
                                        <div>
                                            <h4 class="font-bold text-xs md:text-sm uppercase mono">Vocal Response</h4>
                                            <p class="text-[11px] md:text-sm text-gray-500 mt-0.5 leading-relaxed">Speak clearly and naturally. Do not whisper or shout.</p>
                                        </div>
                                    </li>
                                    <li class="flex gap-4">
                                        <div class="w-6 h-6 md:w-8 md:h-8 rounded md:rounded-lg bg-black text-[#e8dbb3] flex items-center justify-center shrink-0 outfit font-bold text-xs md:text-base">3</div>
                                        <div>
                                            <h4 class="font-bold text-xs md:text-sm uppercase mono">Proctored Session</h4>
                                            <p class="text-[11px] md:text-sm text-gray-500 mt-0.5 leading-relaxed">The system monitors environmental consistency. Maintain focus.</p>
                                        </div>
                                    </li>
                                </ul>
                                <div class="bg-slate-50 p-3 md:p-5 rounded-2xl border-2 border-slate-900/5 mt-4 md:mt-6">
                                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 md:gap-6">
                                        <div>
                                            <h4 class="text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] text-indigo-600">Microphone Protocol</h4>
                                            <p class="text-[10px] md:text-sm font-bold text-slate-800">

                                                    class="flex-1 sm:flex-none px-6 py-2.5 text-[10px] font-black uppercase tracking-widest transition-all ${testData.micMode === 'MANUAL' ? 'bg-black text-white' : 'bg-white text-slate-400 hover:bg-slate-50'}">
                                                Manual

                `;

                if (testData.showTips) {
                    const tipsOverlay = document.createElement('div');
                    tipsOverlay.className = 'fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in no-scrollbar';
                    tipsOverlay.innerHTML = `
                        <div class="bg-white w-full max-w-lg rounded-xl border border-slate-200 overflow-hidden shadow-2xl no-scrollbar overflow-y-auto max-h-[90vh]">
                            <div class="p-8 md:p-12">
                                <div class="flex justify-between items-start mb-10">
                                    <div>
                                        <h4 class="text-[9px] font-bold uppercase tracking-[0.2em] text-slate-400 mb-2">Preparation Guide</h4>
                                        <h2 class="text-2xl md:text-3xl font-black outfit text-slate-950">Pro Tips</h2>
                                    </div>
                                    <button onclick="testData.showTips = false; render();" class="text-slate-300 hover:text-slate-900 transition-colors">
                                        <i class="bi bi-x-lg text-xl"></i>
                                    </button>
                                </div>

                                <div class="space-y-10">
                                    <section>
                                        <h3 class="font-bold text-xs uppercase tracking-widest text-indigo-600 mb-2">Behavioral Framework</h3>
                                        <h4 class="font-black text-xl text-slate-900 outfit mb-3">Mastering the STAR Method</h4>
                                        <p class="text-sm text-slate-500 leading-relaxed mb-4">
                                            The most effective way to answer behavioral questions is by distributing your time across four pillars:
                                        </p>
                                        <div class="space-y-3">
                                            <div class="flex gap-3">
                                                <span class="text-[10px] font-black text-indigo-400 mt-1">20%</span>
                                                <p class="text-xs text-slate-600"><strong class="text-slate-900">Situation & Task:</strong> Briefly set the scene and the goal. Do not over-explain context.</p>
                                            </div>
                                            <div class="flex gap-3">
                                                <span class="text-[10px] font-black text-indigo-400 mt-1">60%</span>
                                                <p class="text-xs text-slate-600"><strong class="text-slate-900">Action:</strong> Detail the specific steps <em class="italic">you</em> took. Use "I" statements, not "We".</p>
                                            </div>
                                            <div class="flex gap-3">
                                                <span class="text-[10px] font-black text-indigo-400 mt-1">20%</span>
                                                <p class="text-xs text-slate-600"><strong class="text-slate-900">Result:</strong> Share the tangible outcome. Use numbers or percentages if possible.</p>
                                            </div>
                                        </div>
                                    </section>

                                    <section>
                                        <h3 class="font-bold text-xs uppercase tracking-widest text-emerald-600 mb-2">Vocal Presence</h3>
                                        <h4 class="font-black text-xl text-slate-900 outfit mb-3">Inflection & Dynamics</h4>
                                        <p class="text-sm text-slate-500 leading-relaxed">
                                            Avoid a "robotic" monotone. Use <span class="text-slate-900 font-bold">Natural Inflection</span>—vary your pitch slightly to emphasize key points. This helps the AI engine and human evaluators perceive confidence and conviction.
                                        </p>
                                    </section>

                                    <section>
                                        <h3 class="font-bold text-xs uppercase tracking-widest text-amber-600 mb-2">Cognitive Strategy</h3>
                                        <h4 class="font-black text-xl text-slate-900 outfit mb-3">Active Listening</h4>
                                        <p class="text-sm text-slate-500 leading-relaxed">
                                            For repetition tasks, focus on <span class="text-slate-900 font-bold">Semantic Anchors</span> (the nouns and verbs). Your brain retains the "meaning" better than a literal audio recording. If you miss a word, continue the sentence naturally rather than stopping.
                                        </p>
                                    </section>
                                </div>

                                <button onclick="testData.showTips = false; render();" class="w-full mt-12 py-4 bg-slate-900 text-white font-bold uppercase tracking-[0.2em] text-[10px] rounded-xl hover:bg-black transition-all">
                                    Continue to Assessment
                                </button>
                            </div>
                        </div>
                    `;
                    app.appendChild(tipsOverlay);
                }
            } else if (state === 'TEST') {
                const section = sections[currentSectionIdx];
                const item = section.items[currentQuestionIdx];
                const totalItems = sections.reduce((acc, s) => acc + s.items.length, 0);
                let currentTotalIdx = 0;
                for (let i = 0; i < currentSectionIdx; i++) currentTotalIdx += sections[i].items.length;
                currentTotalIdx += currentQuestionIdx;
                const progress = ((currentTotalIdx + 1) / totalItems) * 100;

                const sectionColors = {
                    'READING': 'bg-blue-50',
                    'REPEAT': 'bg-green-50',
                    'SHORT_ANSWER': 'bg-yellow-50',
                    'SENTENCE_BUILD': 'bg-purple-50'
                };
                const accentColors = {
                    'READING': 'bg-blue-600',
                    'REPEAT': 'bg-green-600',
                    'SHORT_ANSWER': 'bg-yellow-600',
                    'SENTENCE_BUILD': 'bg-purple-600'
                };

                app.innerHTML = `
                    <div class="h-full w-full flex flex-col ${sectionColors[section.id] || 'bg-white'} transition-colors duration-500 relative">
                        ${testData.showSubmitModal ? `
                        <div class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-fade-in">
                            <div class="nb-card max-w-md w-full p-8 md:p-10 bg-white shadow-[12px_12px_0px_#000] animate-fade-in rounded-xl">
                                <div class="mb-8">
                                    <h3 class="text-xl md:text-2xl font-black outfit text-slate-900 uppercase tracking-tight mb-2">Finalize Session?</h3>
                                    <p class="text-[11px] text-slate-500 font-bold uppercase tracking-widest leading-relaxed">Once submitted, you cannot modify your answers. Performance metrics will be computed immediately.</p>
                                </div>
                                <div class="flex flex-col gap-3">
                                    <button onclick="computeAnalysis(); state='ANALYSIS'; testData.showSubmitModal=false; render();" class="nb-button w-full py-4 bg-black text-[#e8dbb3] font-black uppercase tracking-widest text-[11px] rounded-lg">Confirm & Submit</button>
                                    <button onclick="testData.showSubmitModal = false; render();" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-900 transition-all py-2">Return to Assessment</button>
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        <header class="h-14 shrink-0 border-b border-slate-100 px-4 md:px-8 flex items-center justify-between bg-white relative z-50">
                            <div class="flex items-center gap-4">
                                <span class="text-[10px] md:text-xs font-bold tracking-widest uppercase text-slate-900">Verbal</span>
                                <span class="h-4 w-[1px] bg-slate-100"></span>
                                <span class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-widest truncate max-w-[80px] md:max-w-none">${section.id.replace('_', ' ')}</span>
                            </div>
                            <div class="flex items-center gap-4 md:gap-8">
                                <div class="hidden sm:flex items-center gap-4">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Progress</span>
                                    <div class="w-20 md:w-32 h-1.5 bg-slate-50 border border-slate-100 rounded-full overflow-hidden">
                                        <div class="h-full ${accentColors[section.id] || 'bg-black'} transition-all" style="width: ${progress}%"></div>
                                    </div>
                                </div>
                                <button onclick="testData.showSubmitModal = true; render();" 
                                        class="nb-button px-3 md:px-5 py-1.5 bg-[#fecaca] text-slate-900 text-[10px] font-black uppercase tracking-widest rounded hover:bg-red-600 hover:text-white transition-all">
                                    Finish
                                </button>
                            </div>
                        </header>

                        <main class="flex-grow flex flex-col items-center justify-center p-4 md:p-8 overflow-hidden relative">
                            <div class="max-w-3xl w-full">
                                <div class="mb-8 md:mb-14 relative">
                                    <div class="p-6 md:p-16 nb-card min-h-[220px] md:min-h-[300px] flex items-center justify-center relative bg-white border-2 border-slate-900 shadow-[8px_8px_0px_rgba(0,0,0,0.05)] md:shadow-[12px_12px_0px_rgba(0,0,0,0.1)] rounded-2xl overflow-hidden group">
                                        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, black 1px, transparent 0); background-size: 24px 24px;"></div>
                                        
                                        ${isPlaying ? `
                                            <div class="flex flex-col items-center gap-6">
                                                <div class="w-16 md:w-20 h-16 md:h-20 rounded-full bg-slate-50 flex items-center justify-center border-2 border-slate-100 animate-pulse">
                                                    <i class="bi bi-volume-up-fill text-3xl md:text-4xl text-slate-300"></i>
                                                </div>
                                                <div class="text-center">
                                                    <span class="mono text-[9px] md:text-[10px] font-black uppercase text-indigo-500 tracking-widest block mb-1">Stimulus Playback</span>
                                                    <span class="outfit text-xs md:text-sm font-bold text-slate-300 uppercase">Listen carefully...</span>
                                                </div>
                                            </div>
                                        ` : `
                                            <div class="text-center flex flex-col items-center gap-6 md:gap-8">
                                                <span class="mono text-[9px] md:text-[10px] font-black uppercase text-slate-400 tracking-[0.4em]">${section.instructions}</span>
                                                <p class="text-2xl md:text-5xl font-black outfit tracking-tighter leading-tight text-slate-900 max-w-xl">
                                                    ${section.id === 'READING' ? item.t : (section.id === 'SENTENCE_BUILD' ? item.q : 'Listen carefully.')}
                                                </p>
                                                ${section.id === 'SHORT_ANSWER' || (section.id === 'SENTENCE_BUILD' && !item.q.includes('/')) ?
                        '<span class="px-3 py-1 bg-slate-100 rounded text-[9px] uppercase font-bold text-slate-500">Listen for auditory cue</span>' : ''}
                                            </div>
                                        `}
                                    </div>
                                </div>

                                <div class="flex flex-col items-center gap-8 md:gap-12">
                                    <div class="flex items-center gap-4 md:gap-8 scale-90 md:scale-100">
                                        ${section.id !== 'READING' && !isPlaying && !isRecording ? `
                                            <button onclick="playPrompt('${section.id === 'SHORT_ANSWER' ? item.q : (section.id === 'SENTENCE_BUILD' ? 'Rearrange these phrases: ' + item.q : item.t)}')" 
                                                    class="nb-button w-14 md:w-16 h-14 md:h-16 rounded-full border-black border-2 flex items-center justify-center bg-white hover:bg-slate-50 group transition-all">
                                                <i class="bi bi-play-fill text-2xl md:text-3xl group-hover:scale-110 transition-transform"></i>
                                            </button>
                                        ` : ''}

                                        <button onclick="startRecording()" 
                                                ${isPlaying || isRecording ? 'disabled' : ''}
                                                class="nb-button px-6 md:px-10 py-4 md:py-6 bg-slate-900 text-white flex items-center gap-6 md:gap-8 rounded-2xl shadow-[6px_6px_0px_rgba(15,23,42,0.2)] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all relative overflow-hidden">
                                            <div class="flex items-center gap-3 md:gap-4">
                                                <div class="w-8 md:w-10 h-8 md:h-10 rounded-full bg-white/10 flex items-center justify-center">
                                                    <i class="bi ${isRecording ? 'bi-mic-fill text-red-400' : 'bi-mic text-white'} text-lg md:text-xl"></i>
                                                </div>
                                                <div class="hidden xs:flex items-end gap-[3px] h-6 w-12 md:w-16">
                                                    ${Array.from({ length: 12 }).map((_, i) => `
                                                        <div class="w-[2px] md:w-[3px] bg-white/40 rounded-full ${isRecording ? 'animate-vocal-wave' : ''}" 
                                                             style="height: ${20 + Math.random() * 20}%; animation-delay: ${i * 0.08}s">
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            </div>
                                            <div class="text-left border-l border-white/10 pl-4 md:pl-6">
                                                <span class="block text-[7px] md:text-[8px] font-black uppercase tracking-[0.3em] text-white/40 mb-1">${isRecording ? 'Capturing' : 'Vocal Input'}</span>
                                                <span class="outfit font-black text-[10px] md:text-xs uppercase tracking-[0.2em] whitespace-nowrap">
                                                    ${isRecording ? 'Recording...' : 'Speak Now'}
                                                </span>
                                            </div>
                                        </button>

                                        ${testData.micMode === 'MANUAL' ? `
                                        <button onclick="skip()" 
                                                ${isPlaying || isRecording ? 'disabled' : ''}
                                                class="nb-button w-14 md:w-16 h-14 md:h-16 rounded-full border-slate-200 border-2 flex items-center justify-center bg-white hover:bg-red-50 hover:border-red-200 group transition-all">
                                            <i class="bi bi-arrow-right text-xl md:text-2xl text-slate-300 group-hover:text-red-400 transition-colors"></i>
                                        </button>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </main>
                        <!-- Footer Removed -->
                    </div>
                `;

                // Auto-action logic
                if (state === 'TEST' && !isPlaying && !isRecording && !currentPromptPlayed) {
                    if (section.id !== 'READING') {
                        currentPromptPlayed = true;
                        setTimeout(() => {
                            const item = section.items[currentQuestionIdx];
                            playPrompt(section.id === 'SHORT_ANSWER' ? item.q : (section.id === 'SENTENCE_BUILD' ? 'Rearrange these phrases: ' + item.q : item.t));
                        }, 800);
                    } else if (testData.micMode === 'AUTO') {
                        currentPromptPlayed = true;
                        setTimeout(() => startRecording(), 1500); // 1.5s delay for Reading
                    }
                }
            } else if (state === 'TRANSITION') {
                app.innerHTML = `
                    <div class="h-screen w-full flex items-center justify-center bg-slate-900 animate-fade-in relative">
                        <div class="text-center">
                            <h2 class="text-5xl font-black outfit tracking-tighter uppercase mb-4 text-white animate-pulse">Next Question...</h2>
                        </div>
                    </div>
                `;
            } else if (state === 'SECTION_INTRO') {
                const section = sections[currentSectionIdx];
                app.innerHTML = `
                    <div class="h-screen w-full flex flex-col md:flex-row overflow-hidden animate-fade-in bg-white">
                        <div class="w-full md:w-[40%] bg-black p-8 md:p-12 lg:p-20 flex flex-col justify-between relative overflow-hidden text-white min-h-[250px] md:min-h-0">
                            <div class="absolute -right-20 -bottom-20 opacity-10">
                                <i class="bi bi-info-circle-fill text-[200px] md:text-[300px] leading-none"></i>
                            </div>

                            <div class="relative z-10">
                                <div class="flex items-center gap-3 mb-6 md:mb-10">
                                    <div class="w-8 h-[1.5px] bg-white"></div>
                                    <span class="mono text-[10px] font-black uppercase tracking-[0.5em] opacity-60">Phase ${currentSectionIdx + 1} of ${sections.length}</span>
                                </div>
                                <h1 class="text-3xl md:text-5xl lg:text-7xl font-black outfit leading-[0.85] tracking-tighter mb-8 text-[#e8dbb3]">
                                    ${section.title} <br>Section
                                </h1>
                            </div>

                            <div class="relative z-10 hidden md:block">
                                <div class="px-4 py-2 border border-white/20 inline-block">
                                    <span class="text-[10px] font-black uppercase tracking-[0.3em]">Official Assessment Protocol</span>
                                </div>
                            </div>
                        </div>

                        <div class="w-full md:w-[60%] p-8 md:p-12 lg:p-24 bg-white flex flex-col justify-center overflow-y-auto no-scrollbar">
                            <div class="max-w-2xl">
                                <h3 class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-400 mb-6 md:mb-8 border-b border-slate-100 pb-4">Task Instructions</h3>
                                <p class="text-2xl md:text-4xl font-bold outfit text-slate-900 leading-[1.2] mb-8 md:mb-12">${section.instructions}</p>
                                
                                <div class="space-y-4 md:space-y-6 mb-10 md:mb-16">
                                    <div class="flex gap-4 p-4 md:p-5 bg-slate-50 rounded-xl border border-slate-100">
                                        <i class="bi bi-check2-circle text-indigo-500 text-lg md:text-xl"></i>
                                        <p class="text-xs md:text-sm font-medium text-slate-600">Ensure your environment is quiet and audible.</p>
                                    </div>
                                    <div class="flex gap-4 p-4 md:p-5 bg-slate-50 rounded-xl border border-slate-100">
                                        <i class="bi bi-play-circle text-indigo-500 text-lg md:text-xl"></i>
                                        <p class="text-sm md:text-sm font-medium text-slate-600">Automatic progression after start.</p>
                                    </div>
                                </div>

                                <button onclick="state='TEST'; render();" class="nb-button w-full md:w-auto px-12 py-5 bg-black text-white font-black uppercase tracking-widest text-[10px] md:text-xs rounded-lg shadow-[6px_6px_0px_rgba(15,23,42,0.2)]">
                                    Start Evaluation →
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state === 'ANALYSIS') {
                app.innerHTML = `
                    <div class="h-screen w-full flex flex-col overflow-hidden animate-fade-in bg-white">
                        <div class="h-14 shrink-0 bg-white border-b border-slate-100 flex items-center justify-between px-6 md:px-12 lg:px-24">
                            <h1 class="text-[10px] md:text-xs font-black outfit tracking-widest text-slate-900 uppercase">Assessment Results</h1>
                            <div class="flex gap-2 md:gap-4">
                                <button onclick="location.href='../'" class="nb-button px-4 md:px-6 py-2 bg-white text-slate-900 font-bold uppercase tracking-widest text-[8px] md:text-[9px] rounded">Home</button>
                                <button onclick="location.reload()" class="nb-button px-4 md:px-6 py-2 bg-black text-white font-bold uppercase tracking-widest text-[8px] md:text-[9px] rounded">Retake</button>
                            </div>
                        </div>

                        <div class="flex-grow overflow-y-auto p-6 md:p-12 lg:p-24 relative no-scrollbar">
                            <div class="max-w-4xl mx-auto">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 mb-12 md:mb-20">
                                    <div class="p-8 md:p-10 nb-card bg-[#e8dbb3] border-2 border-slate-900 relative overflow-hidden">
                                        <div class="absolute -right-4 -bottom-4 opacity-5 pointer-events-none">
                                            <i class="bi bi-mic-fill text-[80px] md:text-[120px]"></i>
                                        </div>
                                        <span class="block text-[8px] md:text-[10px] font-black text-slate-600 uppercase mb-4 tracking-[0.2em]">Vocal Proficiency Score</span>
                                        <div class="flex items-baseline gap-2">
                                            <span class="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter">${analysis.score}</span>
                                            <span class="text-lg md:text-xl font-bold text-slate-500">Pts</span>
                                        </div>
                                        <p class="mt-4 md:mt-6 text-[9px] md:text-[10px] font-bold text-slate-500 uppercase leading-relaxed">Composite proficiency based on clarity, articulation and syllabic matching.</p>
                                    </div>
                                    <div class="flex flex-col justify-center p-4">
                                        <span class="block text-[9px] md:text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Global Accuracy</span>
                                        <span class="text-5xl md:text-7xl font-bold text-slate-900 tracking-tighter">${analysis.accuracy}%</span>
                                        <div class="mt-6 flex items-center gap-3">
                                            <div class="px-3 py-1 bg-emerald-100 text-emerald-700 text-[9px] font-black uppercase rounded">Verified</div>
                                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <h4 class="text-[9px] md:text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 mb-8 md:mb-12 border-b border-slate-100 pb-4">Dimension Breakdown</h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8 md:gap-x-16 md:gap-y-12">
                                        ${Object.entries(analysis.categories).map(([name, data]) => {
                    const ratio = data.score / data.total;
                    return `
                                                <div class="space-y-3 md:space-y-4">
                                                    <div class="flex justify-between items-end">
                                                        <span class="text-[9px] md:text-[10px] font-black uppercase text-slate-900 tracking-widest">${name}</span>
                                                        <span class="text-[10px] md:text-xs font-black text-slate-900">${Math.round(ratio * 100)}%</span>
                                                    </div>
                                                    <div class="w-full h-2 bg-slate-50 border border-slate-200 rounded-full overflow-hidden">
                                                        <div class="h-full bg-slate-900" style="width: ${ratio * 100}%"></div>
                                                    </div>
                                                </div>
                                            `;
                }).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        window.onload = init;
    </script>
    <script src="../content/js/script.js"></script>
</body>

</html>
